<body>
  <div class="page">
    <h1>Làm đẹp code</h1>
    <p class="page-desc">
      Chọn tab <strong>HTML</strong>, <strong>JS</strong> hoặc <strong>CSS</strong>,
      dán code vào ô bên trái, chỉnh tuỳ chọn rồi bấm nút làm đẹp.
      Tất cả xử lý đều chạy bằng JavaScript trên trình duyệt (offline).
    </p>

    <!-- MAIN TABS -->
    <div class="main-tabs">
      <button class="main-tab active" data-tab="html">HTML</button>
      <button class="main-tab" data-tab="js">JS</button>
      <button class="main-tab" data-tab="css">CSS</button>
      <button class="main-tab" data-tab="code">CODE</button>
    </div>

    <div id="html-panel-container"></div>
    <div id="js-panel-container"></div>
    <div id="css-panel-container"></div> 
    <div id="code-panel-container"></div> 
    <div class="author">Design & Developer by <a href="tel:09055586889">Dinhit</a></div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/html_tool.js"></script>
  <script src="js/js_tool.js"></script>
  <script src="js/css_tool.js"></script>
  <script src="js/code_tool.js"></script>

  <script>
    fetch('partials/html-panel.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('html-panel-container').innerHTML = data;
        if (window.initHtmlTool) window.initHtmlTool();
      });

    fetch('partials/css-panel.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('css-panel-container').innerHTML = data;
        if (window.initCssTool) window.initCssTool();
      });

    fetch('partials/js-panel.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('js-panel-container').innerHTML = data;
        if (window.initJsTool) window.initJsTool();
      });

    fetch('partials/code-panel.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('code-panel-container').innerHTML = data;
        if (window.initCodeTool) window.initCodeTool();
      });
  </script>
