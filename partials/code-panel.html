<div class="tool-panel" data-tab="code">
  <div class="layout" id="code-panel-content">
      <!-- Code card 1 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Tiêu đề 2 3 dòng</div>
      <div class="output-actions">
        <button
          class="copy-btn"
          type="button"
          data-copy-target="code-card-1"
          data-label-default="Sao chép mã"
          data-label-copied="Đã sao chép"
        >
          <span class="copy-btn__icon copy-default">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2"></rect>
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4
                      a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              ></path>
            </svg>
          </span>

          <span class="copy-btn__icon copy-check">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>

          <span class="copy-btn__label">Sao chép mã</span>
        </button>
      </div>
    </div>

    <textarea
      class="card-content code-output"
      id="code-card-1"
      spellcheck="false"
      readonly
    >overflow: hidden;
text-overflow: ellipsis;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;</textarea>
  </div>
